<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced WhatsApp Link Generator</title>
<style>
  :root { --primary: #25D366; --dark: #075E54; --bg: #f0f2f5; }
  * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
  body { background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .container { background: #fff; border-radius: 12px; padding: 30px; width: 100%; max-width: 450px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
  h2 { color: var(--dark); text-align: center; margin-top: 0; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; font-size: 14px; }
  input[type="text"], input[type="tel"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
  input[type="text"]:focus, input[type="tel"]:focus { border-color: var(--primary); }
  .image-upload { border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.3s; position: relative; }
  .image-upload:hover { border-color: var(--primary); }
  .image-upload img { max-width: 100px; max-height: 100px; border-radius: 50%; display: none; margin: 0 auto; object-fit: cover; }
  .image-upload span { color: #666; font-size: 14px; }
  input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
  button { width: 100%; padding: 14px; background: var(--dark); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
  button:hover { background: #064c44; }
  .note { font-size: 13.5px; color: #555; background: #e9edef; padding: 15px; border-radius: 8px; margin-bottom: 25px; line-height: 1.6; border-left: 4px solid var(--primary); }
</style>
</head>
<body>

<div class="container">
  <h2>✨ പുതിയ വാട്ട്സ്ആപ്പ് ടൂൾ</h2>
  
  <div class="note">
    പഴയതിലെ പ്രശ്നങ്ങൾ പരിഹരിച്ച് തയ്യാറാക്കിയ പുതിയ ടൂൾ. ഇത് നിങ്ങളുടെ ചിത്രവും വാട്ട്സ്ആപ്പ് ലിങ്കും അടങ്ങുന്ന മനോഹരമായ ഒരു <b>Digital Profile Page (Mini Website)</b> നിർമ്മിച്ചു തരും.
  </div>

  <div class="form-group">
    <label>പേര് (Name / Business Name)</label>
    <input type="text" id="name" placeholder="ഉദാ: Muraleedharan P">
  </div>

  <div class="form-group">
    <label>വാട്ട്സ്ആപ്പ് നമ്പർ (Country code വേണം)</label>
    <input type="tel" id="phone" placeholder="919876543210">
  </div>

  <div class="form-group">
    <label>പ്രൊഫൈൽ ചിത്രം (Logo / Photo)</label>
    <div class="image-upload" id="uploadArea">
      <span id="uploadText">ചിത്രം തിരഞ്ഞെടുക്കാൻ ഇവിടെ ക്ലിക്ക് ചെയ്യുക</span>
      <img id="preview" src="" alt="Preview">
      <input type="file" id="imageInput" accept="image/*">
    </div>
  </div>

  <button onclick="generateTool()">🌟 പ്രൊഫൈൽ ഫയൽ ഡൗൺലോഡ് ചെയ്യുക</button>
</div>

<script>
  let base64Image = "";

  document.getElementById('imageInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        base64Image = event.target.result;
        document.getElementById('uploadText').style.display = 'none';
        const img = document.getElementById('preview');
        img.src = base64Image;
        img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });

  function generateTool() {
    const name = document.getElementById('name').value.trim();
    let phone = document.getElementById('phone').value.trim().replace(/[^0-9]/g, '');

    if (!name || !phone || !base64Image) {
      alert("ദയവായി പേരും നമ്പറും ചിത്രവും നൽകുക!");
      return;
    }

    const waLink = "https://wa.me/" + phone;
    
    const generatedHTML = `<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${name} - WhatsApp</title>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #ece5dd 0%, #d4edda 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
    .card { background: white; width: 100%; max-width: 350px; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
    .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #25D366; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(37,211,102,0.3); }
    h1 { margin: 0; font-size: 24px; color: #333; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 30px; font-size: 15px; line-height: 1.5;}
    .wa-btn { display: inline-flex; align-items: center; justify-content: center; background: #25D366; color: white; text-decoration: none; padding: 14px 28px; border-radius: 50px; font-size: 16px; font-weight: bold; transition: 0.3s; width: 85%; box-shadow: 0 4px 15px rgba(37,211,102,0.4); margin: 0 auto; }
    .wa-btn:hover { background: #128C7E; transform: translateY(-2px); }
    .wa-btn svg { width: 24px; height: 24px; margin-right: 10px; fill: currentColor; }
  </style>
</head>
<body>
  <div class="card">
    <img src="${base64Image}" alt="${name}" class="profile-img">
    <h1>${name}</h1>
    <p>എനിക്ക് വാട്ട്സ്ആപ്പിൽ മെസ്സേജ് അയക്കാൻ താഴെയുള്ള ബട്ടൺ ക്ലിക്ക് ചെയ്യുക.</p>
    <a href="${waLink}" class="wa-btn">
      <svg viewBox="0 0 24 24">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Message Me
    </a>
  </div>
</body>
</html>`;

    const blob = new Blob([generatedHTML], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name.replace(/\s+/g, '_') + '_WhatsApp_Profile.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
